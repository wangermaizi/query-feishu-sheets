name: Build Plugin and Skill

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install development dependencies
        run: uv sync --frozen

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugin/feishu-codex-orchestrator/scripts/gateway/package-lock.json

      - name: Test, validate, and package Plugin and Skill
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: feishu-codex-orchestrator-${{ github.sha }}
          path: |
            dist/feishu-requirement-orchestrator.zip
            dist/feishu-requirement-orchestrator.sha256
            dist/feishu-codex-orchestrator.zip
            dist/feishu-codex-orchestrator.sha256
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Download packaged Skill
        uses: actions/download-artifact@v4
        with:
          name: feishu-codex-orchestrator-${{ github.sha }}
          path: dist

      - name: Prepare AI-generated release notes
        run: |
          python3 .agents/skills/release-query-feishu-sheets/scripts/extract_release_notes.py \
            --tag "$GITHUB_REF_NAME" \
            --changelog CHANGELOG.md \
            --output dist/release-notes.md

      - name: Publish tagged GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file dist/release-notes.md
            gh release upload "$GITHUB_REF_NAME" \
              dist/feishu-requirement-orchestrator.zip \
              dist/feishu-requirement-orchestrator.sha256 \
              dist/feishu-codex-orchestrator.zip \
              dist/feishu-codex-orchestrator.sha256 \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/feishu-requirement-orchestrator.zip \
              dist/feishu-requirement-orchestrator.sha256 \
              dist/feishu-codex-orchestrator.zip \
              dist/feishu-codex-orchestrator.sha256 \
              --verify-tag \
              --notes-file dist/release-notes.md \
              --title "$GITHUB_REF_NAME"
          fi
